<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match 1 - VPL Season 01</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e1a;
            color: #fff;
            line-height: 1.6;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            background: rgba(10,14,26,0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0,255,136,0.1);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #00ff88;
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
        }

        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 600;
        }

        .main-content {
            padding: 6rem 5% 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .match-header {
            background: #1f2937;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(0,255,136,0.1);
        }

        .match-title {
            font-size: 0.9rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .teams-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 1rem;
        }

        .team-display { text-align: center; }

        .team-logo-large {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            object-fit: contain;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            margin-bottom: 0.5rem;
        }

        .team-name-display {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .vs-text {
            font-size: 2rem;
            font-weight: 800;
            color: #00ff88;
        }

        .match-date {
            color: #00ff88;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .match-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 300px;
            gap: 2rem;
        }

        @media (max-width: 1200px) {
            .match-grid { grid-template-columns: 1fr; }
        }

        .squad-section {
            background: #1f2937;
            border-radius: 15px;
            padding: 1.5rem;
            border: 1px solid rgba(0,255,136,0.1);
        }

        .squad-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #00ff88;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dropdown-block {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .dropdown-header {
            padding: 1rem;
            background: rgba(0,255,136,0.1);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .dropdown-header:hover { background: rgba(0,255,136,0.2); }

        .dropdown-content {
            padding: 1rem;
            display: none;
        }

        .dropdown-content.active { display: block; }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .player-option {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            background: #0a0e1a;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .player-option:hover {
            border-color: rgba(0,255,136,0.3);
            background: rgba(0,255,136,0.05);
        }

        .player-option.selected {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }

        .player-option input[type="checkbox"] {
            margin-right: 0.75rem;
            width: 18px;
            height: 18px;
            accent-color: #00ff88;
            cursor: pointer;
        }

        .player-details {
            flex: 1;
        }

        .player-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .ipl-team {
            font-size: 0.8rem;
            color: #9ca3af;
            background: rgba(255,255,255,0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            display: inline-block;
            margin-top: 0.25rem;
        }

        .selected-count {
            background: #ff3333;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .selected-count.complete {
            background: #00ff88;
            color: #0a0e1a;
        }

        .selected-players {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0,255,136,0.05);
            border-radius: 8px;
            border: 1px solid rgba(0,255,136,0.2);
        }

        .selected-player {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            margin: 0.25rem;
            background: rgba(0,255,136,0.2);
            border-radius: 50px;
            font-size: 0.85rem;
        }

        /* CAPTAIN SECTION - FIXED */
        .captain-section {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(255,215,0,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 15px;
        }

        .captain-title {
            color: #ffd700;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.2rem;
        }

        .captain-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .captain-option {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: #0a0e1a;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .captain-option:hover {
            border-color: rgba(255,215,0,0.5);
            background: rgba(255,215,0,0.05);
        }

        .captain-option.selected {
            border-color: #ffd700;
            background: rgba(255,215,0,0.15);
        }

        .captain-option input[type="radio"] {
            margin-right: 1rem;
            width: 20px;
            height: 20px;
            accent-color: #ffd700;
        }

        .captain-info {
            flex: 1;
        }

        .captain-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .captain-team {
            font-size: 0.85rem;
            color: #9ca3af;
        }

        .captain-display {
            text-align: center;
            padding: 2rem;
            background: rgba(255,215,0,0.05);
            border-radius: 15px;
            border: 2px solid #ffd700;
        }

        .captain-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffd700;
            margin-bottom: 1rem;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .captain-display-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffd700;
            margin-bottom: 0.5rem;
        }

        .captain-display-team {
            font-size: 1rem;
            color: #9ca3af;
        }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            margin-top: 1.5rem;
            background: #00ff88;
            color: #0a0e1a;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .submit-btn:hover { 
            background: #00cc6a;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,255,136,0.3);
        }

        .edit-btn {
            background: #ff6b35;
            color: white;
        }

        .edit-btn:hover { 
            background: #e55a2b;
            box-shadow: 0 10px 30px rgba(255,107,53,0.3);
        }

        .stats-section {
            background: #1f2937;
            border-radius: 15px;
            padding: 1.5rem;
            border: 1px solid rgba(0,255,136,0.1);
        }

        .stats-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #00ff88;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #9ca3af;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00ff88;
        }

        .points-table {
            width: 100%;
            margin-top: 1rem;
        }

        .points-table th {
            text-align: left;
            padding: 0.5rem;
            color: #9ca3af;
            font-size: 0.85rem;
        }

        .points-table td {
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .total-row {
            font-weight: 700;
            color: #ffd700;
        }

        .read-only .dropdown-content,
        .read-only .captain-list {
            display: none !important;
        }

        .limit-reached {
            opacity: 0.4;
            pointer-events: none;
        }

        .empty-message {
            color: #666;
            text-align: center;
            padding: 2rem;
            font-style: italic;
        }

        .xi-complete {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            color: #00ff88;
            font-weight: 600;
        }
    </style>
</head>

    <nav class="navbar">
        <div class="nav-container">

    <main class="main-content">

                    <div id="t1-captain-message" class="empty-message">

                        Complete your Playing XI (11 players) to select captain
                    </div>

                    <!-- Success message when XI complete -->
                    <div id="t1-xi-complete" class="xi-complete" style="display: none;">
                        <i class="fas
