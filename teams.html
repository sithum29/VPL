    <style>
        /* ============================================
           CSS VARIABLES
           ============================================ */
        :root {
            --primary-bg: #0a0e1a;
            --secondary-bg: #111827;
            --card-bg: #1f2937;
            --accent-neon: #00ff88;
            --accent-orange: #ff6b35;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* ============================================
           NAVIGATION
           ============================================ */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-neon);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-neon);
        }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main-content {
            padding: 6rem 5% 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-secondary);
        }

        /* ============================================
           TEAM SELECTOR (For switching between teams)
           ============================================ */
        .team-selector {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .team-btn {
            padding: 0.75rem 1.5rem;
            background: var(--card-bg);
            border: 2px solid transparent;
            color: var(--text-secondary);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .team-btn:hover, .team-btn.active {
            border-color: var(--accent-neon);
            color: var(--accent-neon);
            background: rgba(0, 255, 136, 0.1);
        }

        /* ============================================
           TEAM HEADER SECTION
           ============================================ */
        .team-header {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 255, 136, 0.1);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 3rem;
            align-items: center;
        }

        /* Team Logo Container - Replace src with your logo */
        .team-logo-large {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            object-fit: contain;
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
        }

        .team-info h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .team-stats {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-neon);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        /* Captain Section - Replace src with captain image */
        .captain-card {
            text-align: center;
            padding: 1.5rem;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .captain-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-neon);
            margin-bottom: 0.75rem;
        }

        .captain-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-neon);
            letter-spacing: 1px;
        }

        .captain-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* ============================================
           SQUAD SECTION
           ============================================ */
        .squad-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(0, 255, 136, 0.1);
        }

        .squad-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .squad-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .squad-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-tag:hover, .filter-tag.active {
            background: var(--accent-neon);
            color: var(--primary-bg);
        }

        /* Players Grid */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.5rem;
        }

        .player-card {
            text-align: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .player-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Player Image - Replace src with player photo from iplt20.com */
        .player-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 0.75rem;
            border: 3px solid transparent;
            transition: 0.3s;
        }

        .player-card:hover .player-image {
            border-color: var(--accent-neon);
        }

        /* Foreign player indicator */
        .foreign-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-orange);
            color: white;
            font-size: 0.65rem;
            padding: 0.25rem 0.5rem;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .player-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .player-role {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Role colors */
        .role-bat { color: #00ff88; }
        .role-bowl { color: #ff6b35; }
        .role-ar { color: #ffd700; }
        .role-wk { color: #0096ff; }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .team-header {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .team-logo-large {
                margin: 0 auto;
            }

            .captain-card {
                margin: 0 auto;
            }

            .players-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>

        /* ============================================
           FUNCTIONS
           ============================================ */

        // Render Players Grid
        function renderPlayers(players) {
            const grid = document.getElementById('playersGrid');
            
            grid.innerHTML = players.map(player => `
                <div class="player-card" data-role="${player.role}">
                    ${player.isForeign ? '<span class="foreign-badge">OS</span>' : ''}
                    <img src="${player.image}" 
                         alt="${player.name}" 
                         class="player-image"
                         onerror="this.src='https://www.iplt20.com/assets/images/players/headshots/0.png'">
                    <div class="player-name">${player.name}</div>
                    <div class="player-role role-${player.role.toLowerCase().replace('-', '')}">${player.role}</div>
                </div>
            `).join('');
        }

        // Filter Squad by Role
        function filterSquad(role) {
            // Update active filter button
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.remove('active');
                if (tag.textContent.includes(role) || (role === 'all' && tag.textContent === 'All')) {
                    tag.classList.add('active');
                }
            });

            // Filter players
            if (role === 'all') {
                renderPlayers(jaffnaSharksSquad);
            } else {
                const filtered = jaffnaSharksSquad.filter(p => p.role === role);
                renderPlayers(filtered);
            }
        }

        // Switch Teams (for future use)
        function showTeam(teamName) {
            // Update active button
            document.querySelectorAll('.team-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // For now, only Jaffna Sharks is implemented
            if (teamName !== 'jaffna') {
                alert('Squad coming soon! Only Jaffna Sharks is available currently.');
                // Reset to active state
                document.querySelectorAll('.team-btn')[0].classList.add('active');
                event.target.classList.remove('active');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderPlayers(jaffnaSharksSquad);
        });
