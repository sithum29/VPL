        /* =========================================
           CSS VARIABLES - THEME CONFIGURATION

        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --bg-hover: #1a1a1a;
            --neon-green: #00ff88;
            --neon-orange: #ff6b35;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #666666;
            --border-color: #222222;
            --shadow-glow: 0 0 20px rgba(0, 255, 136, 0.3);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* NAVIGATION */
        .navbar {
            background: linear-gradient(180deg, #111 0%, var(--bg-dark) 100%);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .nav-home {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-home:hover {
            background: var(--neon-green);
            color: var(--bg-dark);
            box-shadow: var(--shadow-glow);
        }

        /* HEADER & COUNTDOWN */
        .header {
            text-align: center;
            padding: 3rem 1rem;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg-dark) 70%);
        }

        .league-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .season-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .countdown-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 1.5rem;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: var(--shadow-card);
        }

        .countdown-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .time-unit { text-align: center; }

        .time-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--neon-orange);
            display: block;
            line-height: 1;
        }

        .time-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .deadline-text {
            margin-top: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* SYNC STATUS */
        .sync-status {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 99;
            transition: all 0.3s ease;
        }

        .sync-status.syncing {
            background: rgba(0, 255, 136, 0.2);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }

        .sync-status.error {
            background: rgba(255, 107, 53, 0.2);
            color: var(--neon-orange);
            border: 1px solid var(--neon-orange);
        }

        .sync-status.offline {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        /* MAIN CONTAINER */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* CAPTAINS DISPLAY */
        .captains-section { margin-bottom: 3rem; }

        .section-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .captains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .captain-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .captain-card.elected {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            animation: glow 2s infinite;
        }

        .captain-card.pending {
            border-color: var(--neon-orange);
            opacity: 0.7;
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--neon-green);
            margin-bottom: 1rem;
        }

        .captain-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 3px solid var(--neon-green);
        }

        .captain-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .captain-role { color: var(--text-secondary); font-size: 0.9rem; }

        .pending-text { color: var(--neon-orange); font-style: italic; }

        .elected-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--neon-green);
            color: var(--bg-dark);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .timestamp {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* TEAMS SECTION */
        .teams-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .team-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-card);
        }

        .team-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
            padding: 1.5rem;
            border-bottom: 2px solid var(--neon-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .team-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .player-count {
            background: rgba(0, 255, 136, 0.1);
            color: var(--neon-green);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        /* FORM STYLES */
        .captain-form {
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border-color);
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .select-captain {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .select-captain:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .submit-btn {
            margin-top: 1rem;
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--neon-green), #00cc6a);
            border: none;
            border-radius: 8px;
            color: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: var(--shadow-glow);
        }

        .submit-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .submit-btn.loading {
            background: var(--text-muted);
            cursor: wait;
        }

        /* PLAYERS GRID */
        .players-container { padding: 1.5rem; }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
        }

        .player-card {
            background: var(--bg-hover);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .player-card:hover {
            border-color: var(--neon-green);
            transform: translateY(-3px);
        }

        .player-image {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 0.5rem;
            border: 2px solid var(--border-color);
        }

        .player-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-role {
            font-size: 0.7rem;
            color: var(--text-secondary);
            padding: 0.2rem 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: inline-block;
        }

        .foreign-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--neon-orange);
            border-radius: 50%;
            margin-left: 4px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            border-left: 4px solid var(--neon-green);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow-card);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: #ff4444; }

        /* PASSWORD MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--bg-card);
            border: 2px solid var(--neon-green);
            border-radius: 15px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal h2 {
            color: var(--neon-green);
            margin-bottom: 1rem;
        }

        .modal p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .password-input {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            margin-bottom: 1rem;
        }

        .password-input:focus {
            outline: none;
            border-color: var(--neon-green);
        }

        .hidden { display: none !important; }

        /* ANIMATIONS */
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px var(--neon-green); }
            50% { box-shadow: 0 0 20px var(--neon-green), 0 0 30px var(--neon-green); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .league-title { font-size: 1.8rem; }
            .time-value { font-size: 1.8rem; }
            .players-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .team-header { flex-direction: column; text-align: center; }
            .sync-status { top: auto; bottom: 80px; right: 20px; }
        }

        @media (max-width: 480px) {
            .main-container { padding: 1rem; }
            .players-grid { grid-template-columns: repeat(3, 1fr); }
            .player-image { width: 50px; height: 50px; }
        }
    </style>
</head>

        // =========================================
        // LOCALSTORAGE BACKUP (Fallback when JSONBin fails)
        // =========================================
        
        const LOCAL_STORAGE_KEY = 'vpl_captains_backup';
        
        function saveToLocalBackup() {
            try {
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(electedCaptains));
                console.log('Saved to local backup');
            } catch (e) {
                console.error('Local backup failed:', e);
            }
        }
        
        function loadFromLocalBackup() {
            try {
                const data = localStorage.getItem(LOCAL_STORAGE_KEY);
                return data ? JSON.parse(data) : {};
            } catch (e) {
                console.error('Local backup load failed:', e);
                return {};
            }
        }

        // =========================================
        // JSONBIN.IO FUNCTIONS - FIXED VERSION
        // =========================================

        // Test if API key is valid
        async function testApiKey() {
            try {
                const response = await fetch('https://api.jsonbin.io/v3/me', {
                    headers: { 'X-Master-Key': JSONBIN_KEY }
                });
                return response.ok;
            } catch (e) {
                return false;
            }
        }

        // Get or create bin with better error handling
        async function getOrCreateBin() {
            // First, try to find existing bin by name
            try {
                const response = await fetch('https://api.jsonbin.io/v3/collections', {
                    headers: { 'X-Master-Key': JSONBIN_KEY }
                });
                
                if (response.ok) {
                    const collections = await response.json();
                    // Look through bins to find ours
                    for (const collection of collections) {
                        // Check bins in this collection
                        const binsRes = await fetch(`https://api.jsonbin.io/v3/c/${collection.id}/bins`, {
                            headers: { 'X-Master-Key': JSONBIN_KEY }
                        });
                        if (binsRes.ok) {
                            const bins = await binsRes.json();
                            const ourBin = bins.find(b => b.name === BIN_ID);
                            if (ourBin) {
                                binId = ourBin.id;
                                binUrl = `https://api.jsonbin.io/v3/b/${binId}`;
                                // Fetch the actual data
                                const dataRes = await fetch(binUrl, {
                                    headers: { 'X-Master-Key': JSONBIN_KEY }
                                });
                                if (dataRes.ok) {
                                    const data = await dataRes.json();
                                    return data.record || { captains: {} };
                                }
                            }
                        }
                    }
                }
            } catch (e) {
                console.log('Search for existing bin failed:', e);
            }
            
            // If we get here, create new bin
            return await createBin();
        }

        // Create new bin
        async function createBin() {
            try {
                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_KEY,
                        'X-Bin-Name': BIN_ID
                    },
                    body: JSON.stringify({
                        captains: {},
                        created: new Date().toISOString(),
                        version: '1.0'
                    })
                });
                
                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(`Failed to create bin: ${error}`);
                }
                
                const data = await response.json();
                binId = data.metadata.id;
                binUrl = `https://api.jsonbin.io/v3/b/${binId}`;
                
                console.log('Created new bin:', binId);
                showToast('Cloud storage initialized!');
                return { captains: {} };
            } catch (error) {
                console.error('Create bin error:', error);
                throw error;
            }
        }

        // Fetch captains from JSONBin - FIXED to not overwrite local data
        async function fetchCaptains() {
            try {
                updateSyncStatus('syncing');
                
                // Check if API key is configured
                if (JSONBIN_KEY.includes('YOUR_') || JSONBIN_KEY.length < 20) {
                    throw new Error('JSONBin API key not configured');
                }
                
                // Test API key first
                const keyValid = await testApiKey();
                if (!keyValid) {
                    throw new Error('Invalid API key');
                }
                
                const data = await getOrCreateBin();
                
                // CRITICAL FIX: Only update if we got valid data with captains
                // Don't overwrite if server returns empty but we have local data
                if (data && data.captains && Object.keys(data.captains).length > 0) {
                    electedCaptains = data.captains;
                    // Also save to local backup
                    saveToLocalBackup();
                    updateSyncStatus('online');
                } else if (Object.keys(electedCaptains).length === 0) {
                    // Only use empty data if we don't have anything locally
                    electedCaptains = {};
                    updateSyncStatus('online');
                } else {
                    // We have local data but server is empty - keep local, save to server
                    console.log('Local data exists but server empty, syncing up...');
                    await syncUpToServer();
                    updateSyncStatus('online');
                }
                
                renderCaptainsDisplay();
                renderTeams();
                
                return true;
            } catch (error) {
                console.error('Fetch error:', error);
                updateSyncStatus('error');
                
                // CRITICAL FIX: Try to load from local backup if cloud fails
                const localData = loadFromLocalBackup();
                if (Object.keys(localData).length > 0) {
                    console.log('Loaded from local backup');
                    electedCaptains = localData;
                    renderCaptainsDisplay();
                    renderTeams();
                    updateSyncStatus('offline');
                    showToast('Using offline mode (cloud unavailable)', 'error');
                } else {
                    showToast('Error: ' + error.message, 'error');
                }
                
                return false;
            }
        }

        // Sync local data up to server
        async function syncUpToServer() {
            if (!binUrl || Object.keys(electedCaptains).length === 0) return;
            
            try {
                const response = await fetch(binUrl, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_KEY
                    },
                    body: JSON.stringify({
                        captains: electedCaptains,
                        updated: new Date().toISOString()
                    })
                });
                
                if (!response.ok) throw new Error('Sync up failed');
                console.log('Synced local data to server');
            } catch (e) {
                console.error('Sync up failed:', e);
            }
        }

        // Save captain to JSONBin - FIXED VERSION
        async function saveCaptain(teamName, player) {
            // Check API key
            if (JSONBIN_KEY.includes('YOUR_') || JSONBIN_KEY.length < 20) {
                showToast('Please configure JSONBin API key first!', 'error');
                return false;
            }

            try {
                // Update local state FIRST
                electedCaptains[teamName] = {
                    name: player.name,
                    role: player.role,
                    image: player.image,
                    electedAt: new Date().toISOString()
                };
                
                // Save to local backup immediately
                saveToLocalBackup();
                
                // Prepare data for server
                const newData = {
                    captains: electedCaptains,
                    updated: new Date().toISOString()
                };

                // Ensure we have a bin URL
                if (!binUrl) {
                    await getOrCreateBin();
                }
                
                const response = await fetch(binUrl, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_KEY
                    },
                    body: JSON.stringify(newData)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Save failed: ${errorText}`);
                }
                
                // Verify save by fetching back (with delay to allow propagation)
                setTimeout(async () => {
                    await fetchCaptains();
                }, 500);
                
                showToast(`${player.name} elected as captain of ${teamName}!`);
                return true;
                
            } catch (error) {
                console.error('Save error:', error);
                showToast('Error saving to cloud, saved locally', 'error');
                // Data is already saved locally, so return true
                return true;
            }
        }

        function updateSyncStatus(status) {
            const el = document.getElementById('syncStatus');
            if (status === 'syncing') {
                el.textContent = '● Syncing...';
                el.className = 'sync-status syncing';
            } else if (status === 'online') {
                el.textContent = '● Live Sync';
                el.className = 'sync-status syncing';
            } else if (status === 'offline') {
                el.textContent = '● Offline Mode';
                el.className = 'sync-status offline';
            } else {
                el.textContent = '● Error';
                el.className = 'sync-status error';
            }
        }

        function showPasswordModal(teamName) {
            // If already elected, show confirmation
            if (electedCaptains[teamName]) {
                if (!confirm(`Change captain for ${teamName}? Current: ${electedCaptains[teamName].name}`)) {
                    return;
                }
            }
            
            currentTeamUnlock = teamName;
            document.getElementById('modalTeamName').textContent = teamName;
            document.getElementById('passwordModal').classList.remove('hidden');
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }

        function verifyPassword() {
            const input = document.getElementById('passwordInput').value;
            const teamPass = teamPasswords[currentTeamUnlock];
            
            if (input === teamPass || input === MASTER_PASSWORD) {
                document.getElementById('passwordModal').classList.add('hidden');
                enableTeamForm(currentTeamUnlock);
                showToast(`Unlocked ${currentTeamUnlock}!`);
            } else {
                showToast('Incorrect password!', 'error');
            }
        }

        function enableTeamForm(teamName) {
            const selectId = `select-${teamName.replace(/\s+/g, '-')}`;
            const btnId = `btn-${teamName.replace(/\s+/g, '-')}`;
            
            const select = document.getElementById(selectId);
            const btn = document.getElementById(btnId);
            
            if (select && btn) {
                select.disabled = false;
                btn.textContent = 'Elect Captain';
                btn.onclick = () => submitCaptain(teamName);
            }
        }

        function updateCountdown() {
            const deadline = new Date('March 15, 2026 23:59:59').getTime();
            const now = new Date().getTime();
            const distance = deadline - now;

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = '<div class="time-value" style="color: #ff4444;">DEADLINE PASSED</div>';
                disableAllForms();
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        function disableAllForms() {
            document.querySelectorAll('.submit-btn').forEach(btn => {
                btn.disabled = true;
                btn.textContent = 'Deadline Passed';
            });
        }

                        <span class="elected-badge">ELECTED</span>
                        <div class="team-name">${teamName}</div>
                        <img src="${captain.image}" alt="${captain.name}" class="captain-avatar" onerror="this.src='https://documents.iplt20.com/ipl/assets/images/Default-Men.png'">
                        <div class="captain-name">${captain.name}</div>
                        <div class="captain-role">${captain.role}</div>
                        <div class="timestamp">${time}</div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="team-name">${teamName}</div>
                        <img src="https://documents.iplt20.com/ipl/assets/images/Default-Men.png" alt="Pending" class="captain-avatar">
                        <div class="captain-name pending-text">Not Elected Yet</div>
                        <div class="captain-role">Awaiting Owner Decision</div>
                    `;
                }
                
                container.appendChild(card);
            });
        }

        function renderTeams() {
            const container = document.getElementById('teamsContainer');
            container.innerHTML = '';

            Object.entries(teamsData).forEach(([teamName, players]) => {
                const currentCaptain = electedCaptains[teamName];
                
                // Sort players by role for better organization
                const roleOrder = { 'Batter': 1, 'WK': 2, 'All-rounder': 3, 'Bowler': 4 };
                const sortedPlayers = [...players].sort((a, b) => roleOrder[a.role] - roleOrder[b.role]);
                
                const selectOptions = sortedPlayers.map(p => 
                    `<option value="${p.name}" ${currentCaptain && currentCaptain.name === p.name ? 'selected' : ''}>${p.name} (${p.role}) ${p.isForeign ? '[OS]' : ''}</option>`
                ).join('');

                const teamCard = document.createElement('div');
                teamCard.className = 'team-card';
                
                const hasCaptain = !!currentCaptain;
                
                teamCard.innerHTML = `
                    <div class="team-header">
                        <h3 class="team-title">${teamName}</h3>
                        <span class="player-count">${players.length} Players</span>
                    </div>
                    
                    <div class="captain-form">
                        <label class="form-label">${hasCaptain ? '✓ Captain Elected' : '🔒 Select Team Captain:'}</label>
                        <select class="select-captain" id="select-${teamName.replace(/\s+/g, '-')}" disabled>
                            <option value="">-- Choose Captain --</option>
                            ${selectOptions}
                        </select>
                        <button class="submit-btn" id="btn-${teamName.replace(/\s+/g, '-')}" onclick="showPasswordModal('${teamName}')">
                            ${hasCaptain ? '🔒 Change Captain' : '🔓 Unlock to Elect'}
                        </button>
                    </div>
                    
                    <div class="players-container">
                        <div class="players-grid">
                            ${players.map(player => `
                                <div class="player-card">
                                    <img src="${player.image}" alt="${player.name}" class="player-image" onerror="this.src='https://documents.iplt20.com/ipl/assets/images/Default-Men.png'">
                                    <div class="player-name">${player.name}</div>
                                    <div class="player-role">
                                        ${player.role}
                                        ${player.isForeign ? '<span class="foreign-badge" title="Foreign Player"></span>' : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                container.appendChild(teamCard);
            });
        }

        async function submitCaptain(teamName) {
            const selectId = `select-${teamName.replace(/\s+/g, '-')}`;
            const select = document.getElementById(selectId);
            const playerName = select.value;

            if (!playerName) {
                showToast('Please select a captain first!', 'error');
                return;
            }

            const player = teamsData[teamName].find(p => p.name === playerName);
            const btnId = `btn-${teamName.replace(/\s+/g, '-')}`;
            const btn = document.getElementById(btnId);
            
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = 'Saving...';

            const success = await saveCaptain(teamName, player);
            
            btn.classList.remove('loading');
            
            if (success) {
                // Re-render to show updated state
                renderCaptainsDisplay();
                renderTeams();
            } else {
                btn.disabled = false;
                btn.textContent = 'Try Again';
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // =========================================
        // INITIALIZATION
        // =========================================

        document.addEventListener('DOMContentLoaded', () => {
            // First try to load from local backup for immediate display
            const localData = loadFromLocalBackup();
            if (Object.keys(localData).length > 0) {
                electedCaptains = localData;
                renderCaptainsDisplay();
                renderTeams();
            }
            
            // Then fetch from cloud
            fetchCaptains();
            
            // Auto-refresh every 10 seconds (was 30, reduced for better sync)
            setInterval(fetchCaptains, 10000);
            
            // Countdown
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            // Debug info
            console.log('VPL Captain Election loaded');
            console.log('API Key configured:', !JSONBIN_KEY.includes('YOUR_'));
        });

        // Close modal on Enter
        document.getElementById('passwordInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyPassword();
        });
        
        // Close modal on Escape or overlay click
        document.getElementById('passwordModal')?.addEventListener('click', (e) => {
            if (e.target.id === 'passwordModal') {
                document.getElementById('passwordModal').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
