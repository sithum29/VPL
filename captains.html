<html lang="en">

        /* =========================================
           CSS VARIABLES - THEME CONFIGURATION
           ========================================= */
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --bg-hover: #1a1a1a;
            --neon-green: #00ff88;
            --neon-orange: #ff6b35;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #666666;
            --border-color: #222222;
            --shadow-glow: 0 0 20px rgba(0, 255, 136, 0.3);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* NAVIGATION */
        .navbar {
            background: linear-gradient(180deg, #111 0%, var(--bg-dark) 100%);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .nav-home {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-home:hover {
            background: var(--neon-green);
            color: var(--bg-dark);
            box-shadow: var(--shadow-glow);
        }

        /* HEADER & COUNTDOWN */
        .header {
            text-align: center;
            padding: 3rem 1rem;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg-dark) 70%);
        }

        .league-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .season-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .countdown-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 1.5rem;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: var(--shadow-card);
        }

        .countdown-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .time-unit { text-align: center; }

        .time-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--neon-orange);
            display: block;
            line-height: 1;
        }

        .time-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .deadline-text {
            margin-top: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* SYNC STATUS */
        .sync-status {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 99;
            transition: all 0.3s ease;
        }

        .sync-status.syncing {
            background: rgba(0, 255, 136, 0.2);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }

        .sync-status.error {
            background: rgba(255, 107, 53, 0.2);
            color: var(--neon-orange);
            border: 1px solid var(--neon-orange);
        }

        /* MAIN CONTAINER */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* CAPTAINS DISPLAY */
        .captains-section { margin-bottom: 3rem; }

        .section-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .captains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .captain-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .captain-card.elected {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            animation: glow 2s infinite;
        }

        .captain-card.pending {
            border-color: var(--neon-orange);
            opacity: 0.7;
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--neon-green);
            margin-bottom: 1rem;
        }

        .captain-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--neon-green);
            margin-bottom: 1rem;
        }

        .captain-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .captain-role { color: var(--text-secondary); font-size: 0.9rem; }

        .pending-text { color: var(--neon-orange); font-style: italic; }

        .elected-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--neon-green);
            color: var(--bg-dark);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .timestamp {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* TEAMS SECTION */
        .teams-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .team-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-card);
        }

        .team-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
            padding: 1.5rem;
            border-bottom: 2px solid var(--neon-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .team-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .player-count {
            background: rgba(0, 255, 136, 0.1);
            color: var(--neon-green);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        /* FORM STYLES */
        .captain-form {
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border-color);
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .select-captain {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .select-captain:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .submit-btn {
            margin-top: 1rem;
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--neon-green), #00cc6a);
            border: none;
            border-radius: 8px;
            color: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: var(--shadow-glow);
        }

        .submit-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .submit-btn.loading {
            background: var(--text-muted);
            cursor: wait;
        }

        /* PLAYERS GRID */
        .players-container { padding: 1.5rem; }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
        }

        .player-card {
            background: var(--bg-hover);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .player-card:hover {
            border-color: var(--neon-green);
            transform: translateY(-3px);
        }

        .player-image {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 0.5rem;
            border: 2px solid var(--border-color);
        }

        .player-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-role {
            font-size: 0.7rem;
            color: var(--text-secondary);
            padding: 0.2rem 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: inline-block;
        }

        .foreign-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--neon-orange);
            border-radius: 50%;
            margin-left: 4px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            border-left: 4px solid var(--neon-green);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow-card);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: #ff4444; }

        /* PASSWORD MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--bg-card);
            border: 2px solid var(--neon-green);
            border-radius: 15px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal h2 {
            color: var(--neon-green);
            margin-bottom: 1rem;
        }

        .modal p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .password-input {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            margin-bottom: 1rem;
        }

        .password-input:focus {
            outline: none;
            border-color: var(--neon-green);
        }

        .hidden { display: none !important; }

        /* ANIMATIONS */
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px var(--neon-green); }
            50% { box-shadow: 0 0 20px var(--neon-green), 0 0 30px var(--neon-green); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .league-title { font-size: 1.8rem; }
            .time-value { font-size: 1.8rem; }
            .players-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .team-header { flex-direction: column; text-align: center; }
            .sync-status { top: auto; bottom: 80px; right: 20px; }
        }

        @media (max-width: 480px) {
            .main-container { padding: 1rem; }
            .players-grid { grid-template-columns: repeat(3, 1fr); }
            .player-image { width: 50px; height: 50px; }
        }
    </style>

        // =========================================
        // PASSWORDS
        // =========================================
        const teamPasswords = {
            "Jaffna Sharks": "sharks2026",
            "Rajasthan Stallions": "stallions2026",
            "Royal Challengers Galle": "rcg2026",
            "Sunrisers Colombo": "srh2026",
            "Apex Bolt Assassins": "aba2026"
        };
        const MASTER_PASSWORD = "vpl2026";

        // =========================================
        // STATE
        // =========================================
        let electedCaptains = {};
        let currentTeamUnlock = null;
        let binUrl = null;

        // =========================================
        // JSONBIN.IO FUNCTIONS
        // =========================================

        // Get or create bin
        async function getOrCreateBin() {
            try {
                // Try to get existing bin
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    headers: {
                        'X-Master-Key': JSONBIN_KEY
                    }
                });
                
                if (response.status === 404) {
                    // Bin doesn't exist, create it
                    return await createBin();
                }
                
                if (!response.ok) throw new Error('Failed to fetch bin');
                
                const data = await response.json();
                binUrl = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
                return data.record || {};
            } catch (error) {
                console.error('Bin error:', error);
                // Create new bin if fetch fails
                return await createBin();
            }
        }

        // Create new bin
        async function createBin() {
            try {
                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_KEY,
                        'X-Bin-Name': BIN_ID
                    },
                    body: JSON.stringify({
                        captains: {},
                        created: new Date().toISOString()
                    })
                });
                
                if (!response.ok) throw new Error('Failed to create bin');
                
                const data = await response.json();
                binUrl = `https://api.jsonbin.io/v3/b/${data.metadata.id}`;
                
                // Update BIN_ID for future requests
                Object.defineProperty(window, 'BIN_ID', {
                    value: data.metadata.id,
                    writable: true
                });
                
                showToast('Cloud storage created!');
                return { captains: {} };
            } catch (error) {
                console.error('Create error:', error);
                showToast('Using offline mode', 'error');
                return { captains: {} };
            }
        }

        // Fetch captains from JSONBin
        async function fetchCaptains() {
            try {
                updateSyncStatus('syncing');
                
                const data = await getOrCreateBin();
                electedCaptains = data.captains || {};
                
                renderCaptainsDisplay();
                renderTeams();
                updateSyncStatus('online');
                
                return true;
            } catch (error) {
                console.error('Fetch error:', error);
                updateSyncStatus('error');
                return false;
            }
        }

        // Save captain to JSONBin
        async function saveCaptain(teamName, player) {
            if (JSONBIN_KEY.includes('YOUR_')) {
                showToast('Please configure JSONBin key first!', 'error');
                return false;
            }

            try {
                const newData = {
                    captains: {
                        ...electedCaptains,
                        [teamName]: {
                            name: player.name,
                            role: player.role,
                            image: player.image,
                            electedAt: new Date().toISOString()
                        }
                    },
                    updated: new Date().toISOString()
                };

                const url = binUrl || `https://api.jsonbin.io/v3/b/${BIN_ID}`;
                
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_KEY
                    },
                    body: JSON.stringify(newData)
                });

                if (!response.ok) throw new Error('Save failed');
                
                electedCaptains = newData.captains;
                showToast(`${player.name} elected as captain of ${teamName}!`);
                await fetchCaptains(); // Refresh display
                
                return true;
            } catch (error) {
                console.error('Save error:', error);
                showToast('Error saving. Check your JSONBin key.', 'error');
                return false;
            }
        }

        // =========================================
        // UI FUNCTIONS
        // =========================================

        function updateSyncStatus(status) {
            const el = document.getElementById('syncStatus');
            if (status === 'syncing') {
                el.textContent = '● Loading...';
                el.className = 'sync-status syncing';
            } else if (status === 'online') {
                el.textContent = '● Live';
                el.className = 'sync-status syncing';
            } else {
                el.textContent = '● Error';
                el.className = 'sync-status error';
            }
        }

        function showPasswordModal(teamName) {
            currentTeamUnlock = teamName;
            document.getElementById('modalTeamName').textContent = teamName;
            document.getElementById('passwordModal').classList.remove('hidden');
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }

        function verifyPassword() {
            const input = document.getElementById('passwordInput').value;
            const teamPass = teamPasswords[currentTeamUnlock];
            
            if (input === teamPass || input === MASTER_PASSWORD) {
                document.getElementById('passwordModal').classList.add('hidden');
                enableTeamForm(currentTeamUnlock);
                showToast(`Unlocked ${currentTeamUnlock}!`);
            } else {
                showToast('Incorrect password!', 'error');
            }
        }

        function enableTeamForm(teamName) {
            const selectId = `select-${teamName.replace(/\s+/g, '-')}`;
            const btnId = `btn-${teamName.replace(/\s+/g, '-')}`;
            
            const select = document.getElementById(selectId);
            const btn = document.getElementById(btnId);
            
            if (select && btn) {
                select.disabled = false;
                btn.textContent = 'Elect Captain';
                btn.onclick = () => submitCaptain(teamName);
            }
        }

        function updateCountdown() {
            const deadline = new Date('March 15, 2026 23:59:59').getTime();
            const now = new Date().getTime();
            const distance = deadline - now;

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = '<div class="time-value" style="color: #ff4444;">DEADLINE PASSED</div>';
                disableAllForms();
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        function disableAllForms() {
            document.querySelectorAll('.submit-btn').forEach(btn => {
                btn.disabled = true;
                btn.textContent = 'Deadline Passed';
            });
        }

        function renderCaptainsDisplay() {
            const container = document.getElementById('captainsDisplay');
            container.innerHTML = '';

            Object.keys(teamsData).forEach(teamName => {
                const captain = electedCaptains[teamName];
                const card = document.createElement('div');
                card.className = `captain-card ${captain ? 'elected' : 'pending'}`;
                
                if (captain) {
                    const time = captain.electedAt ? new Date(captain.electedAt).toLocaleString() : 'Just now';
                    card.innerHTML = `
                        <span class="elected-badge">ELECTED</span>
                        <div class="team-name">${teamName}</div>
                        <img src="${captain.image}" alt="${captain.name}" class="captain-avatar" onerror="this.src='https://documents.iplt20.com/ipl/assets/images/Default-Men.png'">
                        <div class="captain-name">${captain.name}</div>
                        <div class="captain-role">${captain.role}</div>
                        <div class="timestamp">${time}</div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="team-name">${teamName}</div>
                        <img src="https://documents.iplt20.com/ipl/assets/images/Default-Men.png" alt="Pending" class="captain-avatar">
                        <div class="captain-name pending-text">Not Elected Yet</div>
                        <div class="captain-role">Awaiting Owner Decision</div>
                    `;
                }
                
                container.appendChild(card);
            });
        }

        function renderTeams() {
            const container = document.getElementById('teamsContainer');
            container.innerHTML = '';

            Object.entries(teamsData).forEach(([teamName, players]) => {
                const currentCaptain = electedCaptains[teamName];
                
                const selectOptions = players.map(p => 
                    `<option value="${p.name}" ${currentCaptain && currentCaptain.name === p.name ? 'selected' : ''}>${p.name} (${p.role})</option>`
                ).join('');

                const teamCard = document.createElement('div');
                teamCard.className = 'team-card';
                
                teamCard.innerHTML = `
                    <div class="team-header">
                        <h3 class="team-title">${teamName}</h3>
                        <span class="player-count">${players.length} Players</span>
                    </div>
                    
                    <div class="captain-form">
                        <label class="form-label">🔒 Select Team Captain (Password Required):</label>
                        <select class="select-captain" id="select-${teamName.replace(/\s+/g, '-')}" disabled>
                            <option value="">-- Choose Captain --</option>
                            ${selectOptions}
                        </select>
                        <button class="submit-btn" id="btn-${teamName.replace(/\s+/g, '-')}" onclick="showPasswordModal('${teamName}')">
                            ${currentCaptain ? '🔒 Change Captain' : '🔓 Unlock to Elect'}
                        </button>
                    </div>
                    
                    <div class="players-container">
                        <div class="players-grid">
                            ${players.map(player => `
                                <div class="player-card">
                                    <img src="${player.image}" alt="${player.name}" class="player-image" onerror="this.src='https://documents.iplt20.com/ipl/assets/images/Default-Men.png'">
                                    <div class="player-name">${player.name}</div>
                                    <div class="player-role">
                                        ${player.role}
                                        ${player.isForeign ? '<span class="foreign-badge" title="Foreign Player"></span>' : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                container.appendChild(teamCard);
            });
        }

        async function submitCaptain(teamName) {
            const selectId = `select-${teamName.replace(/\s+/g, '-')}`;
            const select = document.getElementById(selectId);
            const playerName = select.value;

            if (!playerName) {
                showToast('Please select a captain first!', 'error');
                return;
            }

            const player = teamsData[teamName].find(p => p.name === playerName);
            const btnId = `btn-${teamName.replace(/\s+/g, '-')}`;
            const btn = document.getElementById(btnId);
            
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = 'Saving...';

            await saveCaptain(teamName, player);
            
            btn.classList.remove('loading');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // =========================================
        // INITIALIZATION
        // =========================================

        document.addEventListener('DOMContentLoaded', () => {
            // Initial render
            renderCaptainsDisplay();
            renderTeams();
            
            // Fetch from JSONBin
            fetchCaptains();
            
            // Auto-refresh every 30 seconds
            setInterval(fetchCaptains, 30000);
            
            // Countdown
            updateCountdown();
            setInterval(updateCountdown, 1000);
        });

        // Close modal on Enter
        document.getElementById('passwordInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyPassword();
        });
    </script>
