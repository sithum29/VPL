<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --bg-hover: #1a1a1a;
            --neon-green: #00ff88;
            --neon-orange: #ff6b35;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #666666;
            --border-color: #222222;
            --shadow-glow: 0 0 20px rgba(0, 255, 136, 0.3);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .navbar {
            background: linear-gradient(180deg, #111 0%, var(--bg-dark) 100%);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .nav-home {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-home:hover {
            background: var(--neon-green);
            color: var(--bg-dark);
            box-shadow: var(--shadow-glow);
        }

        .header {
            text-align: center;
            padding: 3rem 1rem;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg-dark) 70%);
        }

        .league-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .season-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .countdown-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 1.5rem;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: var(--shadow-card);
        }

        .countdown-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .time-unit { text-align: center; }

        .time-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--neon-orange);
            display: block;
            line-height: 1;
        }

        .time-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .captains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .captain-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .captain-card.elected {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .captain-card.pending {
            border-color: var(--neon-orange);
            opacity: 0.7;
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--neon-green);
            margin-bottom: 1rem;
        }

        .captain-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 3px solid var(--neon-green);
        }

        .captain-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .captain-role { color: var(--text-secondary); font-size: 0.9rem; }

        .pending-text { color: var(--neon-orange); font-style: italic; }

        .elected-badge {
            display: inline-block;
            background: var(--neon-green);
            color: var(--bg-dark);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .teams-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .team-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-card);
        }

        .team-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
            padding: 1.5rem;
            border-bottom: 2px solid var(--neon-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .team-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .player-count {
            background: rgba(0, 255, 136, 0.1);
            color: var(--neon-green);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .captain-form {
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border-color);
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .select-captain {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .select-captain:focus {
            outline: none;
            border-color: var(--neon-green);
        }

        .submit-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--neon-green), #00cc6a);
            border: none;
            border-radius: 8px;
            color: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: var(--shadow-glow);
        }

        .submit-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .players-container { padding: 1.5rem; }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
        }

        .player-card {
            background: var(--bg-hover);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .player-card:hover {
            border-color: var(--neon-green);
            transform: translateY(-3px);
        }

        .player-image {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 0.5rem;
            border: 2px solid var(--border-color);
        }

        .player-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-role {
            font-size: 0.7rem;
            color: var(--text-secondary);
            padding: 0.2rem 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: inline-block;
        }

        .foreign-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--neon-orange);
            border-radius: 50%;
            margin-left: 4px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            border-left: 4px solid var(--neon-green);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow-card);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: #ff4444; }

        @media (max-width: 768px) {
            .league-title { font-size: 1.8rem; }
            .time-value { font-size: 1.8rem; }
            .players-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .team-header { flex-direction: column; text-align: center; }
        }
    </style>
</head>

        // =========================================
        // FUNCTIONS
        // =========================================

        function getPlayerImage(teamName, playerName) {
            const team = teamsData[teamName];
            if (!team) return "https://documents.iplt20.com/ipl/assets/images/Default-Men.png";
            const player = team.find(p => p.name === playerName);
            return player ? player.image : "https://documents.iplt20.com/ipl/assets/images/Default-Men.png";
        }

        function renderCaptains() {
            const container = document.getElementById('captainsDisplay');
            container.innerHTML = '';

            Object.keys(teamsData).forEach(teamName => {
                const captain = ELECTED_CAPTAINS[teamName];
                const card = document.createElement('div');
                card.className = `captain-card ${captain ? 'elected' : 'pending'}`;
                
                if (captain) {
                    const image = getPlayerImage(teamName, captain.name);
                    card.innerHTML = `
                        <span class="elected-badge">ELECTED</span>
                        <div class="team-name">${teamName}</div>
                        <img src="${image}" alt="${captain.name}" class="captain-avatar" onerror="this.src='https://documents.iplt20.com/ipl/assets/images/Default-Men.png'">
                        <div class="captain-name">${captain.name}</div>
                        <div class="captain-role">${captain.role}</div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="team-name">${teamName}</div>
                        <img src="https://documents.iplt20.com/ipl/assets/images/Default-Men.png" alt="Pending" class="captain-avatar">
                        <div class="captain-name pending-text">Not Elected Yet</div>
                        <div class="captain-role">Awaiting Owner Decision</div>
                    `;
                }
                
                container.appendChild(card);
            });
        }

        function renderTeams() {
            const container = document.getElementById('teamsContainer');
            container.innerHTML = '';

            Object.entries(teamsData).forEach(([teamName, players]) => {
                const currentCaptain = ELECTED_CAPTAINS[teamName];
                const hasCaptain = !!currentCaptain;
                
                const roleOrder = { 'Batter': 1, 'WK': 2, 'All-rounder': 3, 'Bowler': 4 };
                const sortedPlayers = [...players].sort((a, b) => roleOrder[a.role] - roleOrder[b.role]);
                
                const teamCard = document.createElement('div');
                teamCard.className = 'team-card';
                
                teamCard.innerHTML = `
                    <div class="team-header">
                        <h3 class="team-title">${teamName}</h3>
                        <span class="player-count">${players.length} Players</span>
                    </div>
                    
                    <div class="captain-form">
                        <label class="form-label">${hasCaptain ? '✓ Captain Elected' : 'Submit Captain:'}</label>
                        <select class="select-captain" id="select-${teamName.replace(/\s+/g, '-')}" ${hasCaptain ? 'disabled' : ''}>
                            <option value="">-- Choose Captain --</option>
                            ${sortedPlayers.map(p => `
                                <option value="${p.name}">
                                    ${p.name} (${p.role}) ${p.isForeign ? '[OS]' : ''}
                                </option>
                            `).join('')}
                        </select>
                        <button class="submit-btn" onclick="submitCaptain('${teamName}')" ${hasCaptain ? 'disabled' : ''}>
                            ${hasCaptain ? 'Captain Already Elected' : 'Elect Captain'}
                        </button>
                    </div>
                    
                    <div class="players-container">
                        <div class="players-grid">
                            ${players.map(player => `
                                <div class="player-card" style="${currentCaptain?.name === player.name ? 'border-color: var(--neon-green); background: rgba(0,255,136,0.1);' : ''}">
                                    <img src="${player.image}" alt="${player.name}" class="player-image" onerror="this.src='https://documents.iplt20.com/ipl/assets/images/Default-Men.png'">
                                    <div class="player-name">${player.name}</div>
                                    <div class="player-role">
                                        ${player.role}
                                        ${player.isForeign ? '<span class="foreign-badge" title="Foreign Player"></span>' : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                container.appendChild(teamCard);
            });
        }

        async function submitCaptain(teamName) {
            const selectId = `select-${teamName.replace(/\s+/g, '-')}`;
            const select = document.getElementById(selectId);
            const playerName = select.value;

            if (!playerName) {
                showToast('Please select a captain first!', 'error');
                return;
            }

            const player = teamsData[teamName].find(p => p.name === playerName);
            
            if (!confirm(`Confirm ${playerName} as captain of ${teamName}?`)) {
                return;
            }

            // Send email notification
            if (FORMSPREE_URL && !FORMSPREE_URL.includes('YOUR_FORM_ID')) {
                const formData = new FormData();
                formData.append('team', teamName);
                formData.append('captain', player.name);
                formData.append('role', player.role);
                formData.append('timestamp', new Date().toLocaleString());
                formData.append('_subject', `VPL Captain Elected: ${teamName}`);

                try {
                    await fetch(FORMSPREE_URL, {
                        method: 'POST',
                        body: formData,
                        headers: { 'Accept': 'application/json' }
                    });
                } catch (e) {
                    console.log('Email notification failed');
                }
            }

            showToast(`${playerName} submitted! Admin will update the page shortly.`);
            select.disabled = true;
            document.querySelector(`button[onclick="submitCaptain('${teamName}')"]`).disabled = true;
            document.querySelector(`button[onclick="submitCaptain('${teamName}')"]`).textContent = 'Submission Received';
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateCountdown() {
            const deadline = new Date('March 15, 2026 23:59:59').getTime();
            const now = new Date().getTime();
            const distance = deadline - now;

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = '<div class="time-value" style="color: #ff4444;">DEADLINE PASSED</div>';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        // =========================================
        // INITIALIZATION
        // =========================================

        document.addEventListener('DOMContentLoaded', () => {
            renderCaptains();
            renderTeams();
            updateCountdown();
            setInterval(updateCountdown, 1000);
        });
    </script>
