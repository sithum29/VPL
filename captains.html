        /* [Same CSS as before - keeping it shorter for focus on the fix] */
        :root {
            --bg-dark: #0a0a0a;

            --neon-orange: #ff6b35;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --danger: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }
        .navbar { background: #111; padding: 1rem 2rem; border-bottom: 1px solid #222; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--neon-green); }
        .header { text-align: center; padding: 2rem 1rem; }
        .league-title { font-size: 2rem; background: linear-gradient(135deg, var(--neon-green), var(--neon-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* DEBUG PANEL */
        .debug-panel {
            background: #1a1a1a;
            border: 2px solid var(--neon-orange);
            border-radius: 10px;
            padding: 1.5rem;
            margin: 2rem auto;
            max-width: 800px;
        }
        .debug-title { color: var(--neon-orange); margin-bottom: 1rem; font-size: 1.2rem; }
        .debug-info { 
            background: #0a0a0a; 
            padding: 1rem; 
            border-radius: 5px; 
            font-family: monospace; 
            font-size: 0.9rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }
        .debug-info.error { color: var(--danger); border-left: 3px solid var(--danger); }
        .debug-info.success { color: var(--neon-green); border-left: 3px solid var(--neon-green); }
        .key-display { 
            background: #000; 
            padding: 0.5rem; 
            border-radius: 3px; 
            color: var(--neon-green);
            word-break: break-all;
        }
        .test-btn {
            background: var(--neon-orange);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 1rem;
        }
        .test-btn:hover { opacity: 0.9; }
        
        /* MAIN CONTENT */
        .main-container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .captains-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .captain-card { background: var(--bg-card); border: 2px solid #333; border-radius: 15px; padding: 1.5rem; text-align: center; }
        .captain-card.elected { border-color: var(--neon-green); }
        .team-card { background: var(--bg-card); border-radius: 15px; margin-bottom: 2rem; overflow: hidden; }
        .team-header { background: linear-gradient(135deg, #1a1a2e, #0f0f1e); padding: 1.5rem; border-bottom: 2px solid var(--neon-green); }
        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem; padding: 1.5rem; }
        .player-card { background: #1a1a1a; border-radius: 10px; padding: 1rem; text-align: center; }
        .player-image { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg-card); padding: 1rem; border-radius: 8px; border-left: 4px solid var(--neon-green); transform: translateX(400px); transition: transform 0.3s; }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--danger); }
        .hidden { display: none !important; }
        
        .mode-badge {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .mode-online { background: rgba(0, 255, 136, 0.2); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .mode-offline { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid #ffc107; }

        const JSONBIN_KEY = '$2a$10$GCoIdBRqefYiQosxyKyiSey3iA6IUSQMOLuqI3jDiRUM7cxt9eNKe';
        
        // If the above doesn't work, try uncommenting this line and commenting the one above:
        // const JSONBIN_KEY = "$2a$10$GCoIdBRqefYiQosxyKyiSey3iA6IUSQMOLuqI3jDiRUM7cxt9eNKe";
        
        const BIN_ID = 'vpl-captains-2026';

        // =========================================
        // DEBUG FUNCTIONS
        // =========================================

        function analyzeKey() {
            const keyDisplay = document.getElementById('keyDisplay');
            const validation = document.getElementById('keyValidation');
            
            // Clean the key (remove any accidental whitespace)
            const cleanKey = JSONBIN_KEY.trim();
            
            // Show masked version
            if (cleanKey && cleanKey.length > 10) {
                const masked = cleanKey.substring(0, 10) + '...' + cleanKey.substring(cleanKey.length - 5);
                keyDisplay.textContent = masked;
            } else {
                keyDisplay.textContent = 'INVALID: ' + cleanKey;
            }
            
            // Validate format
            let issues = [];
            
            if (!cleanKey.startsWith('$2a$10$')) {
                issues.push('Key should start with $2a$10$');
            }
            if (cleanKey.length < 50) {
                issues.push('Key seems too short (' + cleanKey.length + ' chars)');
            }
            if (cleanKey.includes(' ')) {
                issues.push('Key contains spaces - remove them!');
            }
            if (cleanKey.includes('"') || cleanKey.includes("'")) {
                issues.push('Key contains quotes - remove them!');
            }
            
            // Check for common copy-paste errors
            const hasWeirdQuotes = /[""''']/.test(JSONBIN_KEY);
            if (hasWeirdQuotes) {
                issues.push('WARNING: Detected smart/curly quotes in key!');
            }
            
            if (issues.length === 0) {
                validation.innerHTML = '<span style="color: var(--neon-green);">✓ Key format looks correct</span><br>Length: ' + cleanKey.length + ' characters';
                validation.className = 'debug-info success';
                return true;
            } else {
                validation.innerHTML = '<span style="color: var(--danger);">✗ Issues found:</span><br>' + issues.join('<br>');
                validation.className = 'debug-info error';
                return false;
            }
        }

        async function testConnection() {
            const debugPanel = document.getElementById('debugContent');
            
            // Add loading message
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'debug-info';
            loadingDiv.innerHTML = 'Testing connection to JSONBin...';
            debugPanel.appendChild(loadingDiv);
            
            try {
                // Try the /me endpoint first
                const response = await fetch('https://api.jsonbin.io/v3/me', {
                    method: 'GET',
                    headers: {
                        'X-Master-Key': JSONBIN_KEY.trim()
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    loadingDiv.innerHTML = '<span style="color: var(--neon-green);">✓ API Key is VALID!</span><br>User: ' + (data.record?.username || 'Unknown');
                    loadingDiv.className = 'debug-info success';
                    document.getElementById('modeBadge').textContent = '● Online Mode';
                    document.getElementById('modeBadge').className = 'mode-badge mode-online';
                    showToast('API Key working! Refreshing data...');
                    await initApp();
                } else {
                    const errorText = await response.text();
                    loadingDiv.innerHTML = '<span style="color: var(--danger);">✗ API Error:</span><br>Status: ' + response.status + '<br>' + errorText;
                    loadingDiv.className = 'debug-info error';
                    
                    if (response.status === 401) {
                        loadingDiv.innerHTML += '<br><br><strong>Fix:</strong> Your key is invalid. Go to jsonbin.io and generate a new key.';
                    }
                }
            } catch (error) {
                loadingDiv.innerHTML = '<span style="color: var(--danger);">✗ Network Error:</span><br>' + error.message;
                loadingDiv.className = 'debug-info error';
                
                if (error.message.includes('Failed to fetch')) {
                    loadingDiv.innerHTML += '<br><br>This might be a CORS issue or you\'re offline.<br>Try "Use Offline Mode" button.';
                }
            }
        }

        function useOfflineMode() {
            window.OFFLINE_MODE = true;

            document.getElementById('debugPanel').style.display = 'none';

        let electedCaptains = {};
        const LOCAL_KEY = 'vpl_captains_backup';

        function initApp() {
            // Load from localStorage first
            const local = localStorage.getItem(LOCAL_KEY);
            if (local) {
                electedCaptains = JSON.parse(local);
            }
            renderCaptains();
            renderTeams();
        }

        function renderCaptains() {
            const container = document.getElementById('captainsDisplay');
            container.innerHTML = Object.keys(teamsData).map(team => {
                const cap = electedCaptains[team];
                return `
                    <div class="captain-card ${cap ? 'elected' : ''}">
                        <h3>${team}</h3>
                        ${cap ? `
                            <img src="${cap.image}" class="player-image" style="width:80px;height:80px;">
                            <p><strong>${cap.name}</strong></p>
                            <p>${cap.role}</p>
                        ` : '<p style="color:var(--text-secondary)">No captain yet</p>'}
                    </div>
                `;
            }).join('');
        }

        function renderTeams() {
            const container = document.getElementById('teamsContainer');
            container.innerHTML = Object.entries(teamsData).map(([team, players]) => `
                <div class="team-card">
                    <div class="team-header">
                        <h3>${team}</h3>
                        <button onclick="electCaptain('${team}')" style="background:var(--neon-green);border:none;padding:0.5rem 1rem;border-radius:5px;cursor:pointer;">
                            ${electedCaptains[team] ? 'Change' : 'Elect'} Captain
                        </button>
                    </div>
                    <div class="players-grid">
                        ${players.map(p => `
                            <div class="player-card" onclick="selectPlayer('${team}', '${p.name}')" style="cursor:pointer;${electedCaptains[team]?.name === p.name ? 'border:2px solid var(--neon-green);' : ''}">
                                <img src="${p.image}" class="player-image" onerror="this.src='https://documents.iplt20.com/ipl/assets/images/Default-Men.png'">
                                <p style="font-size:0.8rem;">${p.name}</p>
                                <span style="font-size:0.7rem;color:var(--text-secondary)">${p.role}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function selectPlayer(team, playerName) {
            const player = teamsData[team].find(p => p.name === playerName);
            if (confirm(`Elect ${playerName} as captain of ${team}?`)) {
                electedCaptains[team] = {
                    name: player.name,
                    role: player.role,
                    image: player.image,
                    electedAt: new Date().toISOString()
                };
                localStorage.setItem(LOCAL_KEY, JSON.stringify(electedCaptains));
                renderCaptains();
                renderTeams();
                showToast(`${playerName} elected as captain!`);
                
                // Try to sync to JSONBin if online
                if (!window.OFFLINE_MODE && !JSONBIN_KEY.includes('YOUR_')) {
                    syncToCloud();
                }
            }
        }

        async function syncToCloud() {
            try {
                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_KEY.trim(),
                        'X-Bin-Name': BIN_ID
                    },
                    body: JSON.stringify({ captains: electedCaptains, updated: new Date().toISOString() })
                });
                if (response.ok) showToast('Synced to cloud!');
            } catch(e) { console.log('Cloud sync failed:', e); }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Initialize
        analyzeKey();
        if (USE_OFFLINE) useOfflineMode();
    </script>
