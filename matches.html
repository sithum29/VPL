        .vpl-subtitle {

        ============================================

        ============================================

            font-size: 14px;

                flex-wrap: wrap;
                justify-content: center;

                align-items: stretch;
            }

            .filter-tabs {
                justify-content: center;
            }
        }

        /* 
        ============================================
        UTILITY CLASSES
        ============================================
        */
        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

                    <div class="match-header">
                        <div>
                            <div class="match-number">${match.matchNum}</div>
                            <div class="match-venue">${match.venue}</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="match-date">${match.dateRange}</div>
                            <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">
                                ${match.iplMatches}
                            </div>
                        </div>
                    </div>
                    
                    <!-- Match Body: Teams vs Teams -->
                    <div class="match-body">
                        <!-- Team 1 -->
                        <div class="team team-${match.team1}">
                            <div class="team-logo" style="border-color: ${team1.color};">
                             <img src="${team1.logo}" alt="${team1.name}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                            </div>
                            <div class="team-name">${team1.name}</div>
                            <div class="team-short">${team1.short}</div>
                        </div>
                        
                        <!-- VS Section -->
                        <div class="vs-section">
                            <div class="vs-text">VS</div>
                            ${getStatusBadge(match.status)}
                        </div>
                        
                        <!-- Team 2 -->
                        <div class="team team-${match.team2}">
                            <div class="team-logo" style="border-color: ${team2.color};">
                            <img src="${team2.logo}" alt="${team2.name}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                            </div>
                            <div class="team-name">${team2.name}</div>
                            <div class="team-short">${team2.short}</div>
                        </div>
                    </div>
                    
                    <!-- Match Footer: Additional Info -->
                    <div class="match-footer">
                        <div class="match-info">
                            <div class="info-item">
                                <span>🏏</span>
                                <span>T20 Virtual Match</span>
                            </div>
                            <div class="info-item">
                                <span>📊</span>
                                <span>CricketXI Points</span>
                            </div>
                        </div>
                        <a href="m1s1.html?id=${1}" class="scorecard-link">
                            View Details →
                        </a>
                    </div>
                </div>
            `;
        }

        /**
         * Render all matches to the container
         * @param {string} filter - Filter type (all/upcoming/live/completed)
         */
        function renderMatches(filter = 'all') {
            const container = document.getElementById('matches-container');
            let filteredMatches = matchesData;
            
            // Apply filter
            if (filter !== 'all') {
                filteredMatches = matchesData.filter(m => m.status === filter);
            }
            
            // Sort by start date
            filteredMatches.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
            
            // Group by date ranges for dividers
            let currentWeek = '';
            let html = '';
            
            filteredMatches.forEach(match => {
                // Add date divider if new week
                const weekKey = match.dateRange;
                if (weekKey !== currentWeek) {
                    currentWeek = weekKey;
                    html += `<div class="date-divider">${match.dateRange}</div>`;
                }
                
                html += createMatchCard(match);
            });
            
            // Update container
            if (filteredMatches.length === 0) {
                html = `
                    <div style="text-align: center; padding: 60px; color: var(--text-muted);">
                        <div style="font-size: 48px; margin-bottom: 20px;">🏏</div>
                        <div style="font-size: 20px; font-weight: 600;">No matches found</div>
                        <div style="margin-top: 10px;">Check back later for updates</div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            
            // Update match count
            document.getElementById('match-count').textContent = 
                `Showing ${filteredMatches.length} of ${matchesData.length} matches`;
        }

        /**
         * Filter matches by status
         * @param {string} type - Filter type
         */
        function filterMatches(type) {
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Re-render with filter
            renderMatches(type);
        }

        /**
         * View scorecard for a match
         * @param {number} matchId - Match ID
         */
        function viewScorecard(matchId) {
            const match = matchesData.find(m => m.id === matchId);
            if (match) {
                alert(`Scorecard for ${match.matchNum}\n${getTeam(match.team1).name} vs ${getTeam(match.team2).name}\n\nComing soon!`);
                // Replace with: window.location.href = `scorecard.html?id=${matchId}`;
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        
        // Render matches when page loads
        document.addEventListener('DOMContentLoaded', function() {
            renderMatches('all');
            
            // Optional: Auto-update live matches based on current date
            updateLiveStatus();
        });

        /**
         * Automatically update match status based on current date
         * Call this function to check if any matches should be marked as live
         */
        function updateLiveStatus() {
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            
            matchesData.forEach(match => {
                // If today is within match date range, mark as live
                if (todayStr >= match.startDate && todayStr <= match.endDate) {
                    // Uncomment to auto-update: match.status = 'live';
                }
                // If today is after end date, mark as completed
                else if (todayStr > match.endDate) {
                    // Uncomment to auto-update: match.status = 'completed';
                }
            });
            
            // Re-render if changes made
            // renderMatches('all');
        }

        // ==========================================
        // ADDITIONAL FUNCTIONS FOR FUTURE USE
        // ==========================================

        /**
         * Add a new match dynamically
         * Use this function to add matches via JavaScript console or external script
         */
        function addMatch(matchData) {
            matchesData.push({
                id: matchesData.length + 1,
                ...matchData
            });
            renderMatches('all');
        }

        /**
         * Update match result
         * @param {number} matchId - Match ID
         * @param {object} result - Result data (winner, scores, etc.)
         */
        function updateMatchResult(matchId, result) {
            const match = matchesData.find(m => m.id === matchId);
            if (match) {
                match.status = 'completed';
                match.result = result;
                renderMatches('all');
            }
        }

        // Expose functions to global scope for console access
        window.vpl = {
            addMatch,
            updateMatchResult,
            matches: matchesData,
            teams: teamsData,
            refresh: () => renderMatches('all')
        };

    </script>

</body>
</html>
